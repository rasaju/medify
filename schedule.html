<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="robots" content="noindex, nofollow">
<title>安排後續療程</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --teal: #44BDDB;
    --teal-light: #e8f7f9;
    --teal-mid: #b2e6eb;
    --teal-dark: #28A3CA;
    --text-primary: #2C2C2C;
    --text-secondary: #6b8a92;
    --text-muted: #9bb5bc;
    --bg: #f0f6f8;
    --card: #ffffff;
    --border: #daeaee;
    --success: #34c97a;
    --success-light: #e6f9ef;
    --warn: #f59e0b;
    --warn-light: #fef3c7;
    --line-color: #c8e3e9;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    padding: 28px 16px 60px;
    display: flex;
    justify-content: center;
  }

  .container { width: 100%; max-width: 480px; }

  /* Header */
  .page-header {
    margin-bottom: 24px;
    padding: 0 4px;
  }
  .page-header h1 {
    font-size: 22px; font-weight: 700; color: var(--teal-dark);
    letter-spacing: -0.3px;
  }
  .page-header p {
    font-size: 13px; color: var(--text-secondary); margin-top: 4px;
  }

  /* Card */
  .card {
    background: var(--card); border-radius: 20px; padding: 20px;
    box-shadow: 0 2px 20px rgba(0,80,100,0.07); margin-bottom: 14px;
  }
  .card-title {
    font-size: 11px; font-weight: 600; color: var(--text-muted);
    letter-spacing: 1px; text-transform: uppercase; margin-bottom: 16px;
  }

  /* SMS Toggle */
  .sms-row {
    display: flex; align-items: center;
    justify-content: space-between;
    gap: 12px;
    min-width: 0;
  }
  .sms-info { flex: 1; min-width: 0; overflow: hidden; }
  .sms-title {
    font-size: 15px; font-weight: 700; color: var(--text-primary);
    display: flex; align-items: center; gap: 8px;
    white-space: nowrap;
  }
  .sms-icon {
    width: 18px; height: 18px; flex-shrink: 0;
  }
  .sms-sub {
    font-size: 12px; color: var(--text-muted); margin-top: 4px; line-height: 1.5;
  }

  /* Toggle switch — pure CSS, no ~ hack */
  .toggle-wrap { flex-shrink: 0; }
  .toggle-switch {
    position: relative;
    display: inline-block;
    width: 46px; height: 26px;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
  }
  .toggle-switch input {
    position: absolute; opacity: 0; width: 0; height: 0; pointer-events: none;
  }
  .toggle-switch .track {
    position: absolute; inset: 0;
    background: var(--border); border-radius: 99px;
    transition: background 0.25s ease;
  }
  .toggle-switch .thumb {
    position: absolute;
    top: 3px; left: 3px;
    width: 20px; height: 20px;
    border-radius: 50%; background: white;
    box-shadow: 0 1px 5px rgba(0,0,0,0.22);
    transition: transform 0.25s ease;
  }
  .toggle-switch.on .track { background: var(--teal); }
  .toggle-switch.on .thumb { transform: translateX(20px); }

  /* SMS expanded section */
  .sms-expanded {
    max-height: 0; overflow: hidden;
    transition: max-height 0.4s ease, opacity 0.3s ease;
    opacity: 0;
  }
  .sms-expanded.open { max-height: 400px; opacity: 1; }
  .sms-expanded-inner { padding-top: 18px; border-top: 1px solid var(--border); margin-top: 18px; }

  .phone-label {
    font-size: 12px; font-weight: 600; color: var(--text-secondary); margin-bottom: 8px;
    display: flex; justify-content: space-between; align-items: center;
  }
  .edit-link {
    font-size: 12px; color: var(--teal-dark); cursor: pointer; font-weight: 600;
    text-decoration: none;
  }
  .phone-display {
    display: flex; align-items: center; justify-content: space-between;
    padding: 12px 14px; background: var(--teal-light); border-radius: 12px;
    border: 1.5px solid var(--teal-mid);
  }
  .phone-number { font-size: 15px; font-weight: 600; color: var(--text-primary); }
  .verified-badge {
    font-size: 11px; font-weight: 600; color: var(--teal-dark);
    background: white; border: 1.5px solid var(--teal-mid);
    border-radius: 20px; padding: 3px 10px;
  }

  .add-recipient-label {
    font-size: 12px; font-weight: 600; color: var(--text-secondary);
    margin-top: 16px; margin-bottom: 4px;
  }
  .add-recipient-hint {
    font-size: 11px; color: var(--text-muted); margin-bottom: 12px; line-height: 1.5;
  }
  .recipient-row { display: flex; gap: 8px; align-items: center; margin-bottom: 8px; }
  .recipient-select {
    padding: 10px 10px; border: 2px solid var(--border); border-radius: 10px;
    font-size: 13px; font-family: 'Noto Sans TC', sans-serif;
    color: var(--text-primary); background: white; outline: none;
    cursor: pointer;
  }
  .recipient-input {
    flex: 1; padding: 10px 14px; border: 2px solid var(--border); border-radius: 10px;
    font-size: 13px; font-family: 'Noto Sans TC', sans-serif;
    color: var(--text-primary); background: white; outline: none;
    transition: border-color 0.2s;
  }
  .recipient-input:focus { border-color: var(--teal); }
  .remove-btn {
    width: 34px; height: 34px; border-radius: 8px; border: 2px solid var(--border);
    background: white; cursor: pointer; display: flex; align-items: center;
    justify-content: center; flex-shrink: 0; transition: all 0.15s; color: var(--text-muted);
  }
  .remove-btn:hover { border-color: #fca5a5; background: #fff5f5; color: #dc2626; }
  .remove-btn svg { width: 14px; height: 14px; }

  .add-number-btn {
    width: 100%; padding: 10px; border: 2px dashed var(--border); border-radius: 10px;
    background: white; font-size: 13px; font-weight: 600; color: var(--text-secondary);
    font-family: 'Noto Sans TC', sans-serif; cursor: pointer;
    transition: all 0.2s; display: flex; align-items: center; justify-content: center; gap: 6px;
    margin-top: 4px;
  }
  .add-number-btn:hover { border-color: var(--teal-mid); color: var(--teal-dark); background: var(--teal-light); }
  .add-number-btn svg { width: 14px; height: 14px; }

  .save-btn {
    width: 100%; padding: 13px; margin-top: 16px;
    background: linear-gradient(135deg, var(--teal) 0%, var(--teal-dark) 100%);
    color: white; border: none; border-radius: 13px;
    font-size: 14px; font-weight: 700; font-family: 'Noto Sans TC', sans-serif;
    cursor: pointer; transition: all 0.2s;
    box-shadow: 0 4px 16px rgba(42,180,192,0.35);
  }
  .save-btn:hover { transform: translateY(-1px); box-shadow: 0 8px 24px rgba(42,180,192,0.45); }

  /* Date picker */
  .date-label {
    font-size: 14px; font-weight: 600; color: var(--text-secondary); margin-bottom: 10px;
    text-align: center;
  }
  .date-input {
    width: 100%; padding: 14px 16px; border: 2px solid var(--border);
    border-radius: 13px; font-size: 16px; font-family: 'Noto Sans TC', sans-serif;
    font-weight: 600; color: var(--text-primary); background: white;
    outline: none; transition: border-color 0.2s; cursor: pointer;
  }
  .date-input:focus { border-color: var(--teal); }

  /* Progress bar */
  .progress-card {
    background: var(--card); border-radius: 20px; padding: 18px 20px;
    box-shadow: 0 2px 20px rgba(0,80,100,0.07); margin-bottom: 14px;
  }
  .progress-header {
    display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px;
  }
  .progress-title { font-size: 12px; font-weight: 600; color: var(--text-muted); letter-spacing: 0.8px; text-transform: uppercase; }
  .progress-count { font-size: 13px; font-weight: 700; color: var(--teal-dark); }
  .progress-bar-bg {
    height: 6px; background: var(--teal-light); border-radius: 99px; overflow: hidden;
  }
  .progress-bar-fill {
    height: 100%; background: linear-gradient(90deg, var(--teal), var(--teal-dark));
    border-radius: 99px; transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
  }

  /* Timeline */
  .timeline { display: flex; flex-direction: column; gap: 0; }

  .timeline-item {
    display: flex; gap: 16px; position: relative;
    animation: fadeSlideIn 0.3s ease both;
  }
  @keyframes fadeSlideIn {
    from { opacity: 0; transform: translateY(8px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* left column: dot + line */
  .tl-left {
    display: flex; flex-direction: column; align-items: center;
    flex-shrink: 0; width: 32px;
  }
  .tl-dot {
    width: 14px; height: 14px; border-radius: 50%;
    border: 2.5px solid var(--teal); background: white;
    flex-shrink: 0; margin-top: 18px; position: relative; z-index: 1;
    transition: all 0.2s;
  }
  .tl-dot.first {
    width: 16px; height: 16px;
    background: var(--teal); border-color: var(--teal);
    box-shadow: 0 0 0 4px rgba(68,189,219,0.2);
  }
  .tl-line {
    flex: 1; width: 2px; background: var(--line-color);
    margin: 4px 0 0;
  }
  .timeline-item:last-child .tl-line { display: none; }

  /* right content */
  .tl-content {
    flex: 1; padding-bottom: 12px;
  }
  .tl-card {
    background: var(--card); border-radius: 16px; padding: 16px;
    box-shadow: 0 2px 12px rgba(0,80,100,0.06);
    border: 1.5px solid var(--border);
    transition: all 0.2s;
  }
  .tl-card:hover { border-color: var(--teal-mid); box-shadow: 0 4px 20px rgba(0,80,100,0.1); }
  .tl-card.first-card {
    border-color: var(--teal);
    background: linear-gradient(135deg, #f0fbfe 0%, var(--card) 100%);
  }

  .tl-date {
    font-size: 14px; font-weight: 700; color: var(--teal-dark); margin-bottom: 4px;
  }
  .tl-date .weekday {
    font-weight: 500; color: var(--text-secondary); font-size: 13px;
  }
  .tl-inj-name {
    font-size: 13px; font-weight: 700; color: var(--text-primary); margin-bottom: 2px;
  }
  .tl-week {
    font-size: 11px; color: var(--text-muted); font-weight: 500;
  }

  .tl-footer {
    display: flex; justify-content: flex-end; margin-top: 12px; padding-top: 10px;
    border-top: 1px solid var(--border);
  }
  .gcal-btn {
    display: flex; align-items: center; gap: 6px;
    padding: 7px 14px; border-radius: 20px;
    background: white; border: 1.5px solid var(--border);
    font-size: 12px; font-weight: 600; color: var(--text-secondary);
    font-family: 'Noto Sans TC', sans-serif; cursor: pointer; text-decoration: none;
    transition: all 0.15s;
  }
  .gcal-btn:hover { border-color: var(--teal-mid); color: var(--teal-dark); background: var(--teal-light); }
  .gcal-btn svg { width: 14px; height: 14px; }

  /* Load more */
  .load-more-wrap { display: flex; justify-content: center; margin-top: 8px; }
  .load-more-btn {
    padding: 10px 28px; border-radius: 99px; border: 2px solid var(--border);
    background: white; font-size: 13px; font-weight: 600; color: var(--text-secondary);
    font-family: 'Noto Sans TC', sans-serif; cursor: pointer; transition: all 0.15s;
    display: flex; align-items: center; gap: 6px;
  }
  .load-more-btn:hover { border-color: var(--teal-mid); color: var(--teal-dark); background: var(--teal-light); }
  .load-more-btn svg { width: 14px; height: 14px; }
</style>
</head>
<body>
<div class="container">

  <!-- Header -->
  <div class="page-header">
    <h1>安排後續療程</h1>
    <p>輸入第一針日期，自動規劃完整注射時程</p>
  </div>

  <!-- SMS Reminder Card -->
  <div class="card">
    <div class="sms-row">
      <div class="sms-info">
        <div class="sms-title">
          <svg class="sms-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="color:var(--teal-dark)">
            <path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/>
          </svg>
          簡訊回診提醒
        </div>
        <div class="sms-sub">每次注射前 3 天自動發送提醒</div>
      </div>
      <div class="toggle-wrap">
        <div class="toggle-switch" id="smsToggle" role="switch" aria-checked="false" onclick="toggleSms(this)">
          <input type="checkbox" tabindex="-1">
          <div class="track"></div>
          <div class="thumb"></div>
        </div>
      </div>
    </div>

    <!-- Expanded SMS settings -->
    <div class="sms-expanded" id="smsExpanded">
      <div class="sms-expanded-inner">
        <div class="phone-label">
          病患本人手機
          <a class="edit-link">修改</a>
        </div>
        <div class="phone-display">
          <span class="phone-number">0912–345–678</span>
          <span class="verified-badge">OTP 已驗證</span>
        </div>

        <div class="add-recipient-label">+ 新增提醒對象 <span style="font-weight:400;color:var(--text-muted)">（選填）</span></div>
        <div class="add-recipient-hint">可新增家屬或其他號碼，提醒簡訊將同時發送</div>

        <div id="recipientList">
          <div class="recipient-row">
            <select class="recipient-select">
              <option>家屬</option>
              <option>照顧者</option>
              <option>其他</option>
            </select>
            <input class="recipient-input" type="tel" placeholder="0923–456–789">
            <button class="remove-btn" onclick="removeRecipient(this)">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
                <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
              </svg>
            </button>
          </div>
        </div>

        <button class="add-number-btn" onclick="addRecipient()">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
            <line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/>
          </svg>
          新增號碼
        </button>

        <button class="save-btn">儲存提醒設定</button>
      </div>
    </div>
  </div>

  <!-- Date picker card -->
  <div class="card">
    <div class="date-label">請選擇第一針注射日期</div>
    <input type="date" class="date-input" id="startDate" onchange="buildSchedule()">
  </div>

  <!-- Progress card (hidden until date selected) -->
  <div class="progress-card" id="progressCard" style="display:none">
    <div class="progress-header">
      <span class="progress-title">療程進度</span>
      <span class="progress-count" id="progressCount">0 / 18 針</span>
    </div>
    <div class="progress-bar-bg">
      <div class="progress-bar-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <!-- Timeline -->
  <div class="timeline" id="timeline"></div>

  <!-- Load more (hidden until generated) -->
  <div class="load-more-wrap" id="loadMoreWrap" style="display:none">
    <button class="load-more-btn" onclick="showMore()">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round">
        <polyline points="6 9 12 15 18 9"/>
      </svg>
      顯示更多針次
    </button>
  </div>

</div>

<script>
  const TOTAL = 18;
  const CYCLE = 3; // weeks
  const INITIAL_SHOW = 5;
  let showCount = INITIAL_SHOW;
  let schedule = [];

  const weekdays = ['日','一','二','三','四','五','六'];

  function toVal(d) {
    return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
  }

  // Set default date to today
  const today = new Date();
  document.getElementById('startDate').value = toVal(today);

  function buildSchedule() {
    const val = document.getElementById('startDate').value;
    if (!val) return;
    const base = new Date(val + 'T00:00:00');
    schedule = Array.from({ length: TOTAL }, (_, i) => {
      const d = new Date(base);
      d.setDate(d.getDate() + i * CYCLE * 7);
      return d;
    });
    showCount = INITIAL_SHOW;
    renderTimeline();
  }

  function formatDate(d) {
    return `${d.getMonth()+1} 月 ${d.getDate()} 日`;
  }

  function renderTimeline() {
    const tl = document.getElementById('timeline');
    tl.innerHTML = '';

    const visible = schedule.slice(0, showCount);

    document.getElementById('progressCard').style.display = '';
    document.getElementById('progressCount').textContent = `0 / ${TOTAL} 針`;
    document.getElementById('progressFill').style.width = '0%';

    visible.forEach((d, i) => {
      const injNum = i + 1;
      const weekNum = i * CYCLE; // week offset from first injection
      const isFirst = i === 0;
      const weekday = weekdays[d.getDay()];

      const item = document.createElement('div');
      item.className = 'timeline-item';
      item.style.animationDelay = `${i * 40}ms`;

      const gcalTitle = encodeURIComponent(`第 ${injNum} 針注射`);
      const gcalDate = `${d.getFullYear()}${String(d.getMonth()+1).padStart(2,'0')}${String(d.getDate()).padStart(2,'0')}`;
      const gcalUrl = `https://calendar.google.com/calendar/render?action=TEMPLATE&text=${gcalTitle}&dates=${gcalDate}/${gcalDate}`;

      item.innerHTML = `
        <div class="tl-left">
          <div class="tl-dot ${isFirst ? 'first' : ''}"></div>
          <div class="tl-line"></div>
        </div>
        <div class="tl-content">
          <div class="tl-card ${isFirst ? 'first-card' : ''}">
            <div class="tl-date">
              ${formatDate(d)} <span class="weekday">（${weekday}）</span>
            </div>
            <div class="tl-inj-name">第 ${injNum} 針注射</div>
            <div class="tl-week">第 ${weekNum} 週</div>
            <div class="tl-footer">
              <a class="gcal-btn" href="${gcalUrl}" target="_blank" rel="noopener">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                  <rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/>
                </svg>
                加入 Google 日曆
              </a>
            </div>
          </div>
        </div>
      `;
      tl.appendChild(item);
    });

    // Load more button
    const loadMoreWrap = document.getElementById('loadMoreWrap');
    if (showCount < TOTAL) {
      loadMoreWrap.style.display = 'flex';
    } else {
      loadMoreWrap.style.display = 'none';
    }
  }

  function showMore() {
    showCount = Math.min(showCount + 5, TOTAL);
    renderTimeline();
  }

  function toggleSms(el) {
    const on = el.classList.toggle('on');
    el.setAttribute('aria-checked', on);
    document.getElementById('smsExpanded').classList.toggle('open', on);
  }

  function addRecipient() {
    const list = document.getElementById('recipientList');
    const row = document.createElement('div');
    row.className = 'recipient-row';
    row.innerHTML = `
      <select class="recipient-select">
        <option>家屬</option>
        <option>照顧者</option>
        <option>其他</option>
      </select>
      <input class="recipient-input" type="tel" placeholder="09xx–xxx–xxx">
      <button class="remove-btn" onclick="removeRecipient(this)">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round">
          <line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/>
        </svg>
      </button>
    `;
    list.appendChild(row);
  }

  function removeRecipient(btn) {
    btn.closest('.recipient-row').remove();
  }

  // Auto-build on load
  buildSchedule();
</script>
</body>
</html>
