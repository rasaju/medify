<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Roche 藥物週期與智慧排程提醒</title>
    <meta
      name="description"
      content="兩頁 HTML 簡報：Roche VABYSMO 與 POLIVY 給藥週期真實時間軸，以及智慧排程提醒功能視覺排版。"
    />
    <link rel="preconnect" href="https://api.fontshare.com" />
    <link
      href="https://api.fontshare.com/v2/css?f[]=satoshi@400,500,700,900&f[]=general-sans@400,500,600,700&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --bg: #f4f8f9;
        --paper: #ffffff;
        --ink: #17232a;
        --muted: #6b7c83;
        --faint: #d9e6e9;
        --line: #cfe0e4;
        --teal: #4aa3bc;
        --teal-dark: #1f6f83;
        --mint: #e8f6f7;
        --amber: #ffb23f;
        --amber-pale: #fff3cf;
        --navy: #163947;
        --rose: #a84b2f;
        --shadow: 0 28px 80px rgba(27, 64, 76, 0.14);
        --font-display: "Satoshi", "Inter", sans-serif;
        --font-body: "General Sans", "Noto Sans TC", sans-serif;
      }

      * {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }

      html {
        background: #dfecef;
        color: var(--ink);
        font-family: var(--font-body);
        -webkit-font-smoothing: antialiased;
      }

      body {
        min-height: 100vh;
        padding: 32px;
        background:
          radial-gradient(circle at 12% 8%, rgba(74, 163, 188, 0.18), transparent 28%),
          linear-gradient(135deg, #eef6f7 0%, #f8fbfb 48%, #edf6f5 100%);
      }

      main {
        display: grid;
        gap: 32px;
        justify-items: center;
      }

      .slide {
        position: relative;
        width: min(1280px, calc(100vw - 64px));
        aspect-ratio: 16 / 9;
        overflow: hidden;
        border-radius: 28px;
        background: var(--paper);
        box-shadow: var(--shadow);
      }

      .slide::before {
        content: "";
        position: absolute;
        inset: 0;
        pointer-events: none;
        background:
          linear-gradient(90deg, rgba(74, 163, 188, 0.08), transparent 30%),
          radial-gradient(circle at 94% 10%, rgba(255, 178, 63, 0.18), transparent 24%);
      }

      .slide-content {
        position: relative;
        z-index: 1;
        height: 100%;
        padding: 44px 62px 34px;
      }

      .eyebrow {
        display: inline-flex;
        align-items: center;
        gap: 10px;
        color: var(--teal-dark);
        font-size: 15px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
      }

      .eyebrow::before {
        content: "";
        width: 10px;
        height: 10px;
        border-radius: 999px;
        background: var(--teal);
      }

      h1,
      h2 {
        font-family: var(--font-display);
        color: var(--navy);
        line-height: 1.08;
        letter-spacing: -0.035em;
      }

      h1 {
        margin-top: 14px;
        max-width: 860px;
        font-size: clamp(34px, 3.6vw, 52px);
        font-weight: 900;
      }

      h2 {
        margin-top: 14px;
        font-size: clamp(32px, 3.2vw, 48px);
        font-weight: 900;
      }

      .subtitle {
        margin-top: 10px;
        max-width: 760px;
        color: var(--muted);
        font-size: 17px;
        line-height: 1.48;
      }

      .grid-two {
        display: block;
        max-width: 1040px;
        margin: 36px auto 0;
      }

      .grid-two > div {
        display: grid;
        gap: 28px;
      }

      .panel {
        border: 1px solid rgba(31, 111, 131, 0.14);
        border-radius: 26px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 16px 45px rgba(35, 82, 94, 0.08);
      }

      .timeline-card {
        padding: 30px 38px 28px;
      }

      .card-head {
        display: flex;
        justify-content: space-between;
        gap: 18px;
        align-items: baseline;
        margin-bottom: 20px;
      }

      .drug-name {
        font-family: var(--font-display);
        color: var(--navy);
        font-size: 28px;
        font-weight: 900;
        letter-spacing: -0.03em;
      }

      .drug-type {
        color: var(--muted);
        font-size: 15px;
        font-weight: 700;
      }

      .axis-wrap {
        position: relative;
        padding: 40px 0 34px;
      }

      .axis {
        position: relative;
        height: 6px;
        border-radius: 999px;
        background: linear-gradient(90deg, var(--teal-dark), var(--line));
      }

      .axis::after {
        content: "";
        position: absolute;
        right: -8px;
        top: 50%;
        width: 16px;
        height: 16px;
        border-top: 4px solid var(--line);
        border-right: 4px solid var(--line);
        transform: translateY(-50%) rotate(45deg);
      }

      .dot {
        position: absolute;
        top: 50%;
        width: 20px;
        height: 20px;
        border-radius: 999px;
        border: 4px solid #fff;
        background: var(--teal-dark);
        box-shadow: 0 0 0 3px rgba(31, 111, 131, 0.16);
        transform: translate(-50%, -50%);
      }

      .dot.alt {
        background: var(--amber);
        box-shadow: 0 0 0 3px rgba(255, 178, 63, 0.24);
      }

      .label {
        position: absolute;
        top: calc(50% + 28px);
        transform: translateX(-50%);
        color: var(--navy);
        font-size: 18px;
        font-weight: 800;
        white-space: nowrap;
      }

      .label.top {
        top: auto;
        bottom: calc(50% + 24px);
        color: var(--muted);
        font-size: 14px;
        font-weight: 700;
      }

      .small-note {
        margin-top: 8px;
        color: var(--muted);
        font-size: 13px;
        line-height: 1.45;
      }

      .branch-list {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 10px;
        margin-top: 12px;
      }

      .branch {
        min-height: 62px;
        padding: 10px 12px;
        border-radius: 18px;
        background: var(--mint);
        color: var(--navy);
      }

      .branch strong {
        display: block;
        margin-bottom: 4px;
        color: var(--teal-dark);
        font-size: 16px;
      }

      .branch span {
        color: var(--muted);
        font-size: 12px;
        line-height: 1.4;
      }

      .polivy-scale .axis {
        background: linear-gradient(90deg, var(--rose), #ead8d0);
      }

      .polivy-scale .dot {
        background: var(--rose);
        box-shadow: 0 0 0 3px rgba(168, 75, 47, 0.18);
      }

      .summary-box {
        display: none;
        align-content: space-between;
        min-height: 100%;
        padding: 24px;
        background: linear-gradient(145deg, #173947, #215d6e);
        color: #fff;
      }

      .summary-box h3 {
        font-family: var(--font-display);
        font-size: 27px;
        line-height: 1.18;
        letter-spacing: -0.03em;
      }

      .summary-items {
        display: grid;
        gap: 10px;
        margin-top: 16px;
      }

      .summary-item {
        padding: 12px;
        border-radius: 18px;
        background: rgba(255, 255, 255, 0.12);
      }

      .summary-item strong {
        display: block;
        margin-bottom: 4px;
        color: #fff3cf;
        font-size: 18px;
      }

      .summary-item span {
        color: rgba(255, 255, 255, 0.78);
        font-size: 14px;
        line-height: 1.45;
      }

      .source {
        margin-top: 14px;
        color: rgba(255, 255, 255, 0.68);
        font-size: 11px;
        line-height: 1.45;
      }

      .source a {
        color: #fff3cf;
        text-decoration: none;
      }

      .slide-two .slide-content {
        padding: 50px 70px 42px;
      }

      .feature-layout {
        display: block;
        height: calc(100% - 140px);
        margin-top: 36px;
      }

      .feature-copy {
        display: none;
        align-content: center;
        gap: 18px;
      }

      .feature-copy h3 {
        color: var(--navy);
        font-family: var(--font-display);
        font-size: 34px;
        line-height: 1.18;
        letter-spacing: -0.035em;
      }

      .feature-copy p {
        color: var(--muted);
        font-size: 18px;
        line-height: 1.7;
      }

      .logic-stack {
        display: grid;
        gap: 12px;
        margin-top: 8px;
      }

      .logic {
        display: grid;
        grid-template-columns: 34px 1fr;
        gap: 12px;
        align-items: start;
        padding: 14px;
        border-radius: 18px;
        background: rgba(232, 246, 247, 0.86);
      }

      .logic b {
        display: grid;
        place-items: center;
        width: 34px;
        height: 34px;
        border-radius: 999px;
        background: #fff;
        color: var(--teal-dark);
        font-size: 15px;
      }

      .logic span {
        color: var(--navy);
        font-size: 15px;
        font-weight: 700;
        line-height: 1.5;
      }

      .phone-stage {
        position: relative;
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 90px;
        align-items: end;
        justify-content: center;
        height: 100%;
        max-width: 820px;
        margin: 0 auto;
      }

      .phone-block {
        position: relative;
        display: grid;
        justify-items: center;
        align-content: end;
        min-height: 100%;
      }

      .phone-caption {
        justify-self: stretch;
        margin-bottom: 16px;
        padding: 14px 22px;
        border-radius: 18px;
        background: #fff;
        box-shadow: 0 10px 28px rgba(35, 82, 94, 0.08);
        text-align: center;
      }

      .phone-caption strong {
        color: var(--navy);
        font-size: 21px;
      }

      .phone-caption span {
        display: none;
        margin-top: 4px;
        color: var(--muted);
        font-size: 13px;
      }

      .phone-img {
        width: auto;
        height: 420px;
        max-height: none;
        object-fit: contain;
        filter: drop-shadow(0 26px 34px rgba(22, 57, 71, 0.16));
      }

      .phone-block:nth-child(2) .phone-img {
        width: auto;
      }

      .badge {
        display: inline-flex;
        align-items: center;
        width: fit-content;
        padding: 8px 14px;
        border-radius: 999px;
        background: var(--amber-pale);
        color: #a26000;
        font-size: 13px;
        font-weight: 800;
      }

      .footnote {
        display: none;
        position: absolute;
        right: 70px;
        bottom: 24px;
        max-width: 640px;
        color: var(--muted);
        font-size: 10.5px;
        line-height: 1.4;
        text-align: right;
      }

      .footnote a {
        color: var(--teal-dark);
        text-decoration: none;
      }

      @media print {
        body {
          padding: 0;
          background: #fff;
        }

        main {
          gap: 0;
        }

        .slide {
          width: 100vw;
          border-radius: 0;
          box-shadow: none;
          break-after: page;
        }
      }
    </style>
  </head>
  <body>
    <main>
      <section class="slide" aria-label="第一頁：Roche 藥物建議給藥週期">
        <div class="slide-content">
          <p class="eyebrow">Roche medication scheduling</p>
          <h1>依藥物屬性預排給藥週期</h1>

          <div class="grid-two">
            <div>
              <article class="panel timeline-card">
                <div class="card-head">
                  <div>
                    <p class="drug-name">VABYSMO（faricimab）</p>
                    <p class="drug-type">濕性年齡相關黃斑部病變 nAMD</p>
                  </div>
                  <span class="badge">週數至 48 週</span>
                </div>
                <div class="axis-wrap" aria-label="VABYSMO 起始劑量週期">
                  <div class="axis">
                    <span class="dot" style="left: 0%"></span>
                    <span class="dot" style="left: 8.3%"></span>
                    <span class="dot" style="left: 16.7%"></span>
                    <span class="dot" style="left: 25%"></span>
                    <span class="dot alt" style="left: 41.7%"></span>
                    <span class="dot alt" style="left: 50%"></span>
                    <span class="dot alt" style="left: 58.3%"></span>
                    <span class="dot alt" style="left: 75%"></span>
                    <span class="dot alt" style="left: 91.7%"></span>
                    <span class="label top" style="left: 0%">W0</span>
                    <span class="label top" style="left: 8.3%">W4</span>
                    <span class="label top" style="left: 16.7%">W8</span>
                    <span class="label top" style="left: 25%">W12</span>
                    <span class="label" style="left: 12.5%">起始：每 4 週 × 4 劑</span>
                    <span class="label" style="left: 66%">維持：Q8W / Q12W / Q16W 擇一路徑</span>
                  </div>
                </div>
              </article>

              <article class="panel timeline-card" style="margin-top: 16px">
                <div class="card-head">
                  <div>
                    <p class="drug-name">POLIVY（polatuzumab vedotin）</p>
                    <p class="drug-type">初治瀰漫性大 B 細胞淋巴瘤 DLBCL</p>
                  </div>
                  <span class="badge">21 天週期</span>
                </div>
                <div class="axis-wrap polivy-scale" aria-label="POLIVY 六個 21 天療程">
                  <div class="axis">
                    <span class="dot" style="left: 0%"></span>
                    <span class="dot" style="left: 16.7%"></span>
                    <span class="dot" style="left: 33.3%"></span>
                    <span class="dot" style="left: 50%"></span>
                    <span class="dot" style="left: 66.7%"></span>
                    <span class="dot" style="left: 83.3%"></span>
                    <span class="label top" style="left: 0%">C1 D1</span>
                    <span class="label top" style="left: 16.7%">C2 D1</span>
                    <span class="label top" style="left: 33.3%">C3 D1</span>
                    <span class="label top" style="left: 50%">C4 D1</span>
                    <span class="label top" style="left: 66.7%">C5 D1</span>
                    <span class="label top" style="left: 83.3%">C6 D1</span>
                    <span class="label" style="left: 42%">每 21 天一次，共 6 個週期</span>
                  </div>
                </div>
              </article>
            </div>
          </div>
        </div>
      </section>

      <section class="slide slide-two" aria-label="第二頁：智慧排程與提醒功能排版">
        <div class="slide-content">
          <p class="eyebrow">Smart follow-up workflow</p>
          <h2>智慧排程與提醒</h2>

          <div class="feature-layout">
            <div class="phone-stage">
              <figure class="phone-block">
                <figcaption class="phone-caption">
                  <strong>滾動調整</strong>
                  <span>醫師診斷後週期可變更</span>
                </figcaption>
                <img
                  class="phone-img"
                  src="img/調整時間.png" 
                  alt="手機畫面示意：醫師建議調整週期，可選擇延後下一次施打週數。"
                />
              </figure>
              <figure class="phone-block">
                <figcaption class="phone-caption">
                  <strong>多方提醒</strong>
                  <span>病患與家屬共同收到簡訊提醒</span>
                </figcaption>
                <img
                  class="phone-img"
                  src="img/安排後續療程.png"
                  alt="手機畫面示意：安排後續療程，設定簡訊回診提醒與新增提醒號碼。"
                />
              </figure>
            </div>
          </div>

      
        </div>
      </section>
    </main>
  </body>
</html>
